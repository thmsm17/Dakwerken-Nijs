name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        env:
          PORT: '3000'
          BASE_PATH: '/Dakwerken-Nijs/'
          NODE_ENV: 'production'
        run: pnpm --filter @workspace/nijs-dakwerken run build

      - name: Create 404.html for SPA routing
        run: cp artifacts/nijs-dakwerken/dist/public/index.html artifacts/nijs-dakwerken/dist/public/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: artifacts/nijs-dakwerken/dist/public
          branch: gh-pages
